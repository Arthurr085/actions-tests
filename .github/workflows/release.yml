name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Clonar repositório
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Ler versão do frontend
        id: package-version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Verificar se versão já existe
        run: |
          git fetch --tags

          if git rev-parse "${{ steps.package-version.outputs.version }}" >/dev/null 2>&1
          then
            echo "ERRO: Essa versão já existe!"
            exit 1
          fi

      - name: Instalar dependências frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Instalar dependências backend
        working-directory: ./backend
        run: npm ci

      - name: Iniciar backend
        working-directory: ./backend
        run: node src/server.js &

      - name: Testar backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3333/ | grep -q 'API funcionando'; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend não respondeu a tempo"
          exit 1

      - name: Criar tag
        run: |
          git tag ${{ steps.package-version.outputs.version }}
          git push origin ${{ steps.package-version.outputs.version }}

      - name: Criar release no GitHub
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.package-version.outputs.version }}
          name: Release ${{ steps.package-version.outputs.version }}
          generate_release_notes: true
