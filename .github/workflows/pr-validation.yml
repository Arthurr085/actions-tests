# Actions pinned by SHA — last updated: 2026-05-15
# actions/checkout@v4 -> 34e114876b0b11c390a56381ad16ebd13914f8d5
# actions/setup-node@v4 -> 49933ea5288caeca8642d1e84afbd3f7d6820020

name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clonar repositório
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Instalar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Validar versão do sistema
        run: |
          PR_VERSION=$(node -p "require('./frontend/package.json').version")

          git fetch origin main

          git show origin/main:frontend/package.json > main-package.json

          MAIN_VERSION=$(node -p "require('./main-package.json').version")

          echo "Versão PR: $PR_VERSION"
          echo "Versão Main: $MAIN_VERSION"

          node - <<EOF

          const pr = "$PR_VERSION";
          const main = "$MAIN_VERSION";

          function parse(version) {
            return version.split('.').map(Number);
          }

          function compare(a, b) {
            for (let i = 0; i < 3; i++) {
              if (a[i] > b[i]) return 1;
              if (a[i] < b[i]) return -1;
            }

            return 0;
          }

          const prVersion = parse(pr);
          const mainVersion = parse(main);

          const result = compare(prVersion, mainVersion);

          if (result === 0) {
            console.error("ERRO: A versão não foi alterada.");
            process.exit(1);
          }

          if (result < 0) {
            console.error("ERRO: Downgrade de versão não permitido.");
            process.exit(1);
          }

          console.log("Versão válida.");
          EOF

  frontend:
    name: Build Frontend
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clonar repositório
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Instalar dependências frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  backend:
    name: Smoke Test Backend
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clonar repositório
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Instalar dependências backend
        working-directory: ./backend
        run: npm ci

      - name: Iniciar backend
        working-directory: ./backend
        run: node src/server.js &

      - name: Testar backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3333/ | grep -q 'API funcionando'; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend não respondeu a tempo"
          exit 1
